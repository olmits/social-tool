services:
  nextjs-prod-standalone:
    build:
      context: .
      dockerfile: Dockerfile
    image: social-app-admin:prod
    container_name: social-app-admin-prod
    ports:
      - "3000:3000"

  nextjs-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: social-app-admin:dev
    container_name: social-app-admin-dev
    ports:
      - "3000:3000"
    environment:
      - WATCHPACK_POLLING=true
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
            - .next/
        - action: rebuild
          path: package.json