services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: socialapi
      POSTGRES_USER: socialapi
      POSTGRES_PASSWORD: socialapi
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socialapi -d socialapi"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/socialapi
      SPRING_DATASOURCE_USERNAME: socialapi
      SPRING_DATASOURCE_PASSWORD: socialapi
      # Override locally via .env or shell exports:
      # CLAUDE_API_KEY:
      # BLUESKY_APP_PASSWORD:
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
